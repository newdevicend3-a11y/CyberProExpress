  <!-- Contact Section -->
  <section id="contact" class="max-w-4xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-8">Contact CyberProExpress</h2>
    <div class="grid md:grid-cols-2 gap-10">
      <div>
        <h3 class="text-xl font-semibold mb-4">Start a Security Inquiry</h3>
        
        <!-- Updated Form -->
        <form action="https://formspree.io/f/xblrjleb" 
              method="POST" 
              class="space-y-4">
          
          <input type="text" 
                 name="name" 
                 placeholder="Full Name" 
                 required
                 class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400">

          <input type="email" 
                 name="email" 
                 placeholder="Business Email" 
                 required
                 class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400">

          <textarea name="message" 
                    placeholder="Tell us about your security needs" 
                    required
                    class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl h-32 focus:outline-none focus:border-cyan-400"></textarea>

          <!-- Hidden field to set subject -->
          <input type="hidden" name="_subject" value="New Inquiry from CyberProExpress Website">

          <button type="submit" 
                  class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-semibold px-6 py-3 rounded-xl w-full md:w-auto transition">
            Submit Inquiry
          </button>
        </form>
      </div>

      <div>
        <h3 class="text-xl font-semibold mb-4">Direct Contact</h3>
        <p class="text-slate-300 mb-3">Email: <a href="mailto:hello@cyberproexpress.com" class="hover:text-cyan-400">hello@cyberproexpress.com</a></p>
        <p class="text-slate-300">Phone: +1 (218) 530‑5148</p>
      </div>
    </div>
  </section>
